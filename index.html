<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>When Did You Last…?</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F4FF;--white:#FFFFFF;--navy:#1B2A4A;--gray:#8899BB;
  --shadow:0 6px 24px rgba(27,42,74,.10);--shadow-lg:0 12px 40px rgba(27,42,74,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{background:linear-gradient(135deg,#1B2A4A,#2E4080);padding:26px 20px 20px;
  text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 20% 50%,rgba(74,144,217,.18) 0%,transparent 60%),
             radial-gradient(circle at 80% 30%,rgba(165,94,234,.15) 0%,transparent 50%);}
header h1{font-family:'Baloo 2',cursive;font-size:clamp(1.5rem,4vw,2.4rem);color:#fff;
  position:relative;text-shadow:0 2px 12px rgba(0,0,0,.3);}
header h1 span{color:#FDCB6E;}
header p{color:rgba(255,255,255,.72);font-size:.88rem;margin-top:4px;position:relative;}
.dot-row{display:flex;justify-content:center;gap:8px;margin-top:11px;position:relative;}
.dot{width:9px;height:9px;border-radius:50%;animation:pulse 2s ease-in-out infinite;}
.dot:nth-child(1){background:#FF6B6B;animation-delay:0s;}.dot:nth-child(2){background:#FF9F43;animation-delay:.2s;}
.dot:nth-child(3){background:#26de81;animation-delay:.4s;}.dot:nth-child(4){background:#4A90D9;animation-delay:.6s;}
.dot:nth-child(5){background:#A55EEA;animation-delay:.8s;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.4);opacity:1;}}

/* TOGGLE BAR */
.global-bar{background:var(--white);border-bottom:2px solid #E8EAF6;padding:9px 16px;
  display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(27,42,74,.08);}
.tg{display:flex;align-items:center;gap:7px;}
.tg-lbl{font-family:'Baloo 2',cursive;font-size:.82rem;color:var(--navy);font-weight:700;}
.sw{position:relative;width:44px;height:23px;cursor:pointer;display:inline-block;}
.sw input{opacity:0;width:0;height:0;position:absolute;}
.sw-track{position:absolute;inset:0;background:#cdd5e0;border-radius:50px;transition:.25s;}
.sw input:checked + .sw-track{background:#4A90D9;}
.sw-thumb{position:absolute;left:3px;top:2.5px;width:18px;height:18px;border-radius:50%;
  background:#fff;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2);pointer-events:none;}
.sw input:checked ~ .sw-thumb{left:23px;}
.tog-div{width:1px;height:22px;background:#E0E4F0;}

main{max-width:1000px;margin:0 auto;padding:18px 14px 60px;}

/* CAT NAV */
.cat-nav{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
.cat-btn{font-family:'Baloo 2',cursive;font-size:.8rem;padding:6px 13px;border:none;
  border-radius:50px;cursor:pointer;transition:all .22s;background:var(--white);color:var(--navy);
  box-shadow:0 3px 10px rgba(0,0,0,.08);}
.cat-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.14);}
.cat-btn.active{color:#fff;transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.2);}

.section{display:none;animation:fadeUp .35s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.sec-header{border-radius:18px;padding:16px 20px;margin-bottom:16px;color:#fff;
  display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-lg);}
.sec-header .be{font-size:2.4rem;line-height:1;}
.sec-header h2{font-family:'Baloo 2',cursive;font-size:1.3rem;margin-bottom:1px;}
.sec-header p{font-size:.83rem;opacity:.88;}

.prog-wrap{background:var(--white);border-radius:14px;padding:12px 18px;margin-bottom:16px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;}
.prog-wrap span{font-family:'Baloo 2',cursive;font-size:.88rem;color:var(--navy);white-space:nowrap;}
.bar-track{flex:1;height:11px;background:#EEF0F8;border-radius:50px;overflow:hidden;}
.bar-fill{height:100%;border-radius:50px;transition:width .5s;background:linear-gradient(90deg,#26de81,#4A90D9);}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;}
.verb-card{background:var(--white);border-radius:18px;padding:16px;box-shadow:var(--shadow);
  border-left:5px solid;transition:transform .2s,box-shadow .2s;cursor:pointer;}
.verb-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.verb-card .back{display:none;}
.verb-card.flipped .front{display:none;}
.verb-card.flipped .back{display:block;}

.verb-tag{display:inline-block;font-size:.73rem;font-weight:800;padding:2px 10px;
  border-radius:50px;margin-bottom:8px;color:#fff;}
.v-phrase{font-family:'Baloo 2',cursive;font-size:.96rem;color:var(--navy);
  line-height:1.35;margin-bottom:10px;}

/* VFP */
.vfp{border-radius:11px;padding:9px 11px;margin-bottom:10px;
  background:linear-gradient(135deg,rgba(27,42,74,.04),rgba(74,144,217,.04));
  border:1.5px solid #E0E8FF;}
.vfp-title{font-size:.69rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  color:var(--gray);margin-bottom:6px;}
.vfp-row{display:flex;gap:5px;}
.vfp-item{flex:1;text-align:center;background:var(--white);border-radius:8px;
  padding:5px 5px;border:1.5px solid #E8EAF6;}
.vfp-form{font-family:'Baloo 2',cursive;font-size:.82rem;font-weight:700;color:var(--navy);}
.vfp-ipa{font-size:.68rem;color:#6C5CE7;margin-top:1px;font-family:monospace;}
.vfp-lbl{font-size:.64rem;color:var(--gray);margin-top:2px;font-weight:700;text-transform:uppercase;}

/* ── INLINE LINE ITEM ── */
/* Each "line" = a row with 🔊 button + text */
.line{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.line-content{flex:1;}
.line-label{font-size:.7rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:2px;}
.line-en{font-size:.9rem;color:var(--navy);line-height:1.5;font-weight:600;}
.line-vi{font-size:.79rem;color:var(--gray);font-style:italic;margin-top:1px;font-weight:600;}

/* ── INLINE PLAY BUTTON ── */
.iplay{
  flex-shrink:0;
  width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;transition:all .18s;
  box-shadow:0 2px 8px rgba(0,0,0,.14);
  margin-top:2px;
}
.iplay:active{transform:scale(.93);}
.iplay.playing{animation:ripple .7s ease-in-out infinite alternate;}
@keyframes ripple{from{box-shadow:0 2px 8px rgba(0,0,0,.14);}to{box-shadow:0 4px 18px rgba(0,0,0,.3);}}
/* colour variants */
.iplay-q  {background:#1B2A4A;color:#FDCB6E;}
.iplay-yes{background:#26de81;color:#fff;}
.iplay-no {background:#FF6B6B;color:#fff;}
.iplay-fol{background:#4A90D9;color:#fff;}

/* Q block on card front */
.q-block{border-radius:12px;padding:10px 12px;margin-bottom:8px;}

/* answer block background tints */
.ans-yes-bg{background:#E8FFF3;border-left:3px solid #26de81;border-radius:0 10px 10px 0;padding:2px 8px 2px 0;}
.ans-no-bg {background:#FFF0F0;border-left:3px solid #FF6B6B;border-radius:0 10px 10px 0;padding:2px 8px 2px 0;}
.ans-fol-bg{background:#EAF3FF;border-left:3px solid #4A90D9;border-radius:0 10px 10px 0;padding:2px 8px 2px 0;}

.tap-hint{font-size:.74rem;color:var(--gray);text-align:right;margin-top:6px;font-style:italic;}
.back-title{font-family:'Baloo 2',cursive;font-size:.9rem;margin-bottom:10px;}

/* ── RECORDER PANEL ── */
.rec-panel{
  margin-top:12px;border-top:1.5px dashed #E0E8FF;padding-top:11px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.rec-btn{
  display:inline-flex;align-items:center;gap:5px;font-family:'Baloo 2',cursive;
  font-size:.78rem;font-weight:700;padding:7px 14px;border:none;border-radius:50px;
  cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.12);
  white-space:nowrap;
}
.rec-btn:active{transform:scale(.95);}
.rec-start{background:#E84393;color:#fff;}
.rec-start.recording{background:#c0002f;animation:recPulse .8s ease-in-out infinite alternate;}
@keyframes recPulse{from{box-shadow:0 2px 10px rgba(232,67,147,.3);}to{box-shadow:0 4px 22px rgba(232,67,147,.7);}}
.rec-play{background:#6C5CE7;color:#fff;}
.rec-play.playing{background:#4A90D9;}
.rec-timer{font-family:'Baloo 2',cursive;font-size:.8rem;color:#E84393;font-weight:700;min-width:36px;}
.rec-hint{font-size:.73rem;color:var(--gray);font-style:italic;width:100%;}

/* ── ALL GRID ── */
.all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px;margin-bottom:20px;}
.all-card{border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .22s;
  box-shadow:var(--shadow);color:#fff;}
.all-card:hover{transform:translateY(-4px) scale(1.03);box-shadow:var(--shadow-lg);}
.all-card .ae{font-size:1.9rem;margin-bottom:6px;}
.all-card .an{font-family:'Baloo 2',cursive;font-size:.92rem;font-weight:700;}
.all-card .ac{font-size:.76rem;opacity:.85;margin-top:2px;}

/* ── RANDOM ── */
.rand-box{background:linear-gradient(135deg,#1B2A4A,#2E4080);border-radius:22px;padding:26px;
  text-align:center;color:#fff;box-shadow:var(--shadow-lg);margin-bottom:18px;}
.rq{font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,3vw,1.55rem);margin:12px 0 4px;
  line-height:1.4;color:#FDCB6E;}
.rq-vi{font-size:.88rem;color:rgba(255,255,255,.58);font-style:italic;margin-bottom:10px;}
.rtag{display:inline-block;padding:3px 12px;border-radius:50px;font-size:.76rem;font-weight:700;margin-bottom:10px;}
.rand-btn{font-family:'Baloo 2',cursive;font-size:.98rem;padding:11px 26px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#FDCB6E,#FF9F43);color:var(--navy);cursor:pointer;font-weight:700;
  box-shadow:0 6px 20px rgba(253,203,110,.4);transition:all .2s;margin-top:6px;}
.rand-btn:hover{transform:translateY(-2px) scale(1.03);}
.rand-btn.reveal{background:linear-gradient(135deg,#26de81,#4A90D9);color:#fff;margin-left:8px;}

/* random lines */
.rnd-lines{text-align:left;margin-top:14px;}
.rnd-line{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.rnd-line-content{flex:1;}
.rnd-line-en{font-size:.92rem;line-height:1.5;color:#fff;}
.rnd-line-vi{font-size:.8rem;color:rgba(255,255,255,.55);font-style:italic;margin-top:1px;}
.rnd-line-lbl{font-size:.7rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  color:#FDCB6E;margin-bottom:2px;}

.rnd-answers{display:none;animation:fadeUp .3s ease;}
.rnd-answers.show{display:block;}
.rnd-ans-card{background:rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;margin-bottom:7px;}

/* random iplay variants for dark bg */
.iplay-rq  {background:#FDCB6E;color:#1B2A4A;}
.iplay-ryes{background:#26de81;color:#fff;}
.iplay-rno {background:#FF6B6B;color:#fff;}
.iplay-rfol{background:#4A90D9;color:#fff;}

/* random recorder */
.rnd-rec-panel{
  margin-top:14px;border-top:1.5px dashed rgba(255,255,255,.2);padding-top:12px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;
}
.rnd-rec-hint{font-size:.73rem;color:rgba(255,255,255,.5);font-style:italic;width:100%;text-align:center;}

/* rnd vfp */
.rnd-vfp{background:rgba(255,255,255,.08);border-radius:11px;padding:10px 11px;margin-top:12px;text-align:left;}
.rnd-vfp .vfp-title{color:rgba(255,255,255,.5);}
.rnd-vfp .vfp-item{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.12);}
.rnd-vfp .vfp-form{color:#FDCB6E;}
.rnd-vfp .vfp-ipa{color:rgba(255,255,255,.65);}
.rnd-vfp .vfp-lbl{color:rgba(255,255,255,.45);}

@media(max-width:480px){
  .cards-grid{grid-template-columns:1fr;}
  .all-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header>
  <h1>⏰ When did you <span>last</span>…?</h1>
  <p>A2 · Thẻ lật · 🔊 Nghe từng câu · 🎙️ Ghi âm & so sánh · 📖 IPA</p>
  <div class="dot-row">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>
</header>

<div class="global-bar">
  <div class="tg">
    <span class="tg-lbl">🇻🇳 Tiếng Việt</span>
    <label class="sw"><input type="checkbox" id="tog-vi" checked><div class="sw-track"></div><div class="sw-thumb"></div></label>
  </div>
  <div class="tog-div"></div>
  <div class="tg">
    <span class="tg-lbl">📖 Chia động từ</span>
    <label class="sw"><input type="checkbox" id="tog-vf" checked><div class="sw-track"></div><div class="sw-thumb"></div></label>
  </div>
</div>

<main>
  <nav class="cat-nav" id="cat-nav"></nav>
  <div class="prog-wrap" id="prog-wrap" style="display:none">
    <span id="prog-lbl">0 / 0 đã xem</span>
    <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    <span id="prog-pct">0%</span>
  </div>
  <div id="sections-root"></div>
</main>

<script>
// ══════════════════════════════════
// VERB DICTIONARY
// ══════════════════════════════════
const VD={
  wash:     {v1:"wash",     i1:"/wɒʃ/",       v2:"washed",    i2:"/wɒʃt/",       v3:"washed",     i3:"/wɒʃt/"},
  cut:      {v1:"cut",      i1:"/kʌt/",        v2:"cut",       i2:"/kʌt/",         v3:"cut",        i3:"/kʌt/"},
  prepare:  {v1:"prepare",  i1:"/prɪˈpeə/",    v2:"prepared",  i2:"/prɪˈpeəd/",    v3:"prepared",   i3:"/prɪˈpeəd/"},
  put:      {v1:"put",      i1:"/pʊt/",        v2:"put",       i2:"/pʊt/",         v3:"put",        i3:"/pʊt/"},
  go:       {v1:"go",       i1:"/ɡəʊ/",        v2:"went",      i2:"/went/",        v3:"gone",       i3:"/ɡɒn/"},
  water:    {v1:"water",    i1:"/ˈwɔːtə/",     v2:"watered",   i2:"/ˈwɔːtəd/",     v3:"watered",    i3:"/ˈwɔːtəd/"},
  wear:     {v1:"wear",     i1:"/weə/",        v2:"wore",      i2:"/wɔː/",         v3:"worn",       i3:"/wɔːn/"},
  get:      {v1:"get",      i1:"/ɡet/",        v2:"got",       i2:"/ɡɒt/",         v3:"got/gotten", i3:"/ɡɒt/"},
  eat:      {v1:"eat",      i1:"/iːt/",        v2:"ate",       i2:"/et/",          v3:"eaten",      i3:"/ˈiːtn/"},
  drink:    {v1:"drink",    i1:"/drɪŋk/",      v2:"drank",     i2:"/dræŋk/",       v3:"drunk",      i3:"/drʌŋk/"},
  rest:     {v1:"rest",     i1:"/rest/",       v2:"rested",    i2:"/ˈrestɪd/",     v3:"rested",     i3:"/ˈrestɪd/"},
  stretch:  {v1:"stretch",  i1:"/stretʃ/",     v2:"stretched", i2:"/stretʃt/",     v3:"stretched",  i3:"/stretʃt/"},
  feel:     {v1:"feel",     i1:"/fiːl/",       v2:"felt",      i2:"/felt/",        v3:"felt",       i3:"/felt/"},
  start:    {v1:"start",    i1:"/stɑːt/",      v2:"started",   i2:"/ˈstɑːtɪd/",   v3:"started",    i3:"/ˈstɑːtɪd/"},
  use:      {v1:"use",      i1:"/juːz/",       v2:"used",      i2:"/juːzd/",       v3:"used",       i3:"/juːzd/"},
  choose:   {v1:"choose",   i1:"/tʃuːz/",      v2:"chose",     i2:"/tʃəʊz/",      v3:"chosen",     i3:"/ˈtʃəʊzn/"},
  compare:  {v1:"compare",  i1:"/kəmˈpeə/",    v2:"compared",  i2:"/kəmˈpeəd/",   v3:"compared",   i3:"/kəmˈpeəd/"},
  visit:    {v1:"visit",    i1:"/ˈvɪzɪt/",     v2:"visited",   i2:"/ˈvɪzɪtɪd/",   v3:"visited",    i3:"/ˈvɪzɪtɪd/"},
  pick:     {v1:"pick",     i1:"/pɪk/",        v2:"picked",    i2:"/pɪkt/",        v3:"picked",     i3:"/pɪkt/"},
  weed:     {v1:"weed",     i1:"/wiːd/",       v2:"weeded",    i2:"/ˈwiːdɪd/",    v3:"weeded",     i3:"/ˈwiːdɪd/"},
  grow:     {v1:"grow",     i1:"/ɡrəʊ/",       v2:"grew",      i2:"/ɡruː/",        v3:"grown",      i3:"/ɡrəʊn/"},
  catch:    {v1:"catch",    i1:"/kætʃ/",       v2:"caught",    i2:"/kɔːt/",        v3:"caught",     i3:"/kɔːt/"},
  climb:    {v1:"climb",    i1:"/klaɪm/",      v2:"climbed",   i2:"/klaɪmd/",      v3:"climbed",    i3:"/klaɪmd/"},
  hide:     {v1:"hide",     i1:"/haɪd/",       v2:"hid",       i2:"/hɪd/",         v3:"hidden",     i3:"/ˈhɪdn/"},
  watch:    {v1:"watch",    i1:"/wɒtʃ/",       v2:"watched",   i2:"/wɒtʃt/",       v3:"watched",    i3:"/wɒtʃt/"},
  text:     {v1:"text",     i1:"/tekst/",      v2:"texted",    i2:"/ˈtekstɪd/",   v3:"texted",     i3:"/ˈtekstɪd/"},
  listen:   {v1:"listen",   i1:"/ˈlɪsn/",      v2:"listened",  i2:"/ˈlɪsnd/",     v3:"listened",   i3:"/ˈlɪsnd/"},
  dance:    {v1:"dance",    i1:"/dɑːns/",      v2:"danced",    i2:"/dɑːnst/",      v3:"danced",     i3:"/dɑːnst/"},
  park:     {v1:"park",     i1:"/pɑːk/",       v2:"parked",    i2:"/pɑːkt/",       v3:"parked",     i3:"/pɑːkt/"},
  pedal:    {v1:"pedal",    i1:"/ˈpedl/",      v2:"pedalled",  i2:"/ˈpedld/",      v3:"pedalled",   i3:"/ˈpedld/"},
  coast:    {v1:"coast",    i1:"/kəʊst/",      v2:"coasted",   i2:"/ˈkəʊstɪd/",   v3:"coasted",    i3:"/ˈkəʊstɪd/"},
  take:     {v1:"take",     i1:"/teɪk/",       v2:"took",      i2:"/tʊk/",         v3:"taken",      i3:"/ˈteɪkən/"},
  swim:     {v1:"swim",     i1:"/swɪm/",       v2:"swam",      i2:"/swæm/",        v3:"swum",       i3:"/swʌm/"},
  celebrate:{v1:"celebrate",i1:"/ˈselɪbreɪt/",v2:"celebrated",i2:"/ˈselɪbreɪtɪd/",v3:"celebrated",i3:"/ˈselɪbreɪtɪd/"},
  stay:     {v1:"stay",     i1:"/steɪ/",       v2:"stayed",    i2:"/steɪd/",       v3:"stayed",     i3:"/steɪd/"},
  laugh:    {v1:"laugh",    i1:"/lɑːf/",       v2:"laughed",   i2:"/lɑːft/",       v3:"laughed",    i3:"/lɑːft/"},
  carry:    {v1:"carry",    i1:"/ˈkæri/",      v2:"carried",   i2:"/ˈkærid/",      v3:"carried",    i3:"/ˈkærid/"},
  see:      {v1:"see",      i1:"/siː/",        v2:"saw",       i2:"/sɔː/",         v3:"seen",       i3:"/siːn/"},

// ══════════════════════════════════
// AUDIO PLAYBACK
// ══════════════════════════════════
function playAu(url,btn){
  if(curAudio){curAudio.pause();curAudio.currentTime=0;}
  if(curBtn){curBtn.classList.remove('playing');}
  if(curBtn===btn){curAudio=null;curBtn=null;return;}
  const a=new Audio(url);
  curAudio=a; curBtn=btn;
  btn.classList.add('playing');
  a.play().catch(()=>{});
  a.onended=()=>{btn.classList.remove('playing');curAudio=null;curBtn=null;};
  a.onerror=()=>{btn.classList.remove('playing');btn.textContent='❌';};
}

function mkIP(cls,url){
  const b=document.createElement('button');
  b.className='iplay '+cls; b.textContent='🔊';
  b.onclick=e=>{e.stopPropagation();playAu(url,b);};
  return b;
}

// ══════════════════════════════════
// RECORDING
// ══════════════════════════════════
async function getMic(){
  if(mediaStream) return mediaStream;
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({audio:true});
    return mediaStream;
  }catch(e){
    alert('⚠️ Không thể truy cập micro. Hãy cho phép quyền trong cài đặt trình duyệt.');
    return null;
  }
}

// Choose best MIME type for iPad/iOS + Chrome/Firefox
function bestMime(){
  const types=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus','audio/ogg',''];
  for(const t of types){if(!t||MediaRecorder.isTypeSupported(t)) return t;}
  return '';
}

function buildRecPanel(panelId, dark=false){
  const wrap=document.createElement('div');
  wrap.className=dark?'rnd-rec-panel':'rec-panel';
  wrap.dataset.panelId=panelId;

  const startBtn=document.createElement('button');
  startBtn.className='rec-btn rec-start';
  startBtn.innerHTML='🎙️ Ghi âm';

  const timer=document.createElement('span');
  timer.className='rec-timer'; timer.textContent='';

  const playBtn=document.createElement('button');
  playBtn.className='rec-btn rec-play'; playBtn.innerHTML='▶️ Nghe lại';
  playBtn.style.display='none';

  const hint=document.createElement('div');
  hint.className=dark?'rnd-rec-hint':'rec-hint';
  hint.textContent='🎙️ Ghi âm câu trả lời của bạn, rồi nghe lại để so sánh!';

  wrap.appendChild(startBtn);
  wrap.appendChild(timer);
  wrap.appendChild(playBtn);
  wrap.appendChild(hint);

  let recInterval=null, secs=0;
  let localBlob=null, localUrl=null, localAudio=null;

  startBtn.onclick=async e=>{
    e.stopPropagation();
    if(mediaRecorder&&mediaRecorder.state==='recording'){
      // STOP
      mediaRecorder.stop();
      clearInterval(recInterval);
      startBtn.classList.remove('recording');
      startBtn.innerHTML='🎙️ Ghi âm';
      timer.textContent='';
    } else {
      // START
      const stream=await getMic();
      if(!stream) return;
      const mime=bestMime();
      const opts=mime?{mimeType:mime}:{};
      try{
        mediaRecorder=new MediaRecorder(stream,opts);
      }catch(err){
        mediaRecorder=new MediaRecorder(stream);
      }
      recChunks=[];
      mediaRecorder.ondataavailable=ev=>{if(ev.data&&ev.data.size>0) recChunks.push(ev.data);};
      mediaRecorder.onstop=()=>{
        const mime2=mediaRecorder.mimeType||'audio/webm';
        localBlob=new Blob(recChunks,{type:mime2});
        if(localUrl) URL.revokeObjectURL(localUrl);
        localUrl=URL.createObjectURL(localBlob);
        playBtn.style.display='inline-flex';
        hint.textContent='✅ Đã ghi xong! Bấm ▶️ để nghe lại và so sánh với mẫu.';
      };
      mediaRecorder.start(100);
      secs=0; timer.textContent='0:00';
      startBtn.classList.add('recording');
      startBtn.innerHTML='⏹️ Dừng';
      recInterval=setInterval(()=>{
        secs++;
        const m=Math.floor(secs/60), s=secs%60;
        timer.textContent=m+':'+(s<10?'0':'')+s;
        if(secs>=120){startBtn.click();} // auto-stop at 2 min
      },1000);
    }
  };

  playBtn.onclick=e=>{
    e.stopPropagation();
    if(!localUrl) return;
    if(localAudio&&!localAudio.paused){
      localAudio.pause(); localAudio.currentTime=0;
      playBtn.classList.remove('playing'); playBtn.innerHTML='▶️ Nghe lại'; return;
    }
    localAudio=new Audio(localUrl);
    playBtn.classList.add('playing'); playBtn.innerHTML='⏹️ Đang phát…';
    localAudio.play().catch(()=>{});
    localAudio.onended=()=>{playBtn.classList.remove('playing'); playBtn.innerHTML='▶️ Nghe lại';};
  };

  return wrap;
}

function mkLine(lbl,lblColor,enText,viText,audioUrl,iplayCls,bgCls,dark=false){
  const wrap=document.createElement('div');
  if(bgCls) wrap.className=bgCls;

  const row=document.createElement('div'); row.className='line';

  const btn=mkIP(iplayCls, audioUrl);
  row.appendChild(btn);

  const content=document.createElement('div'); content.className='line-content';
  if(lbl){
    const l=document.createElement('div'); l.className='line-label';
    l.style.color=dark?'rgba(253,203,110,.85)':lblColor;
    l.textContent=lbl; content.appendChild(l);
  }
  const en=document.createElement('div'); en.className='line-en';
  if(dark) en.style.color='#fff';
  en.textContent=enText; content.appendChild(en);

  const vi=document.createElement('div'); vi.className='line-vi vi-el';
  vi.style.display=showVI?'':'none';
  if(dark) vi.style.color='rgba(255,255,255,.55)';
  vi.textContent=viText; content.appendChild(vi);

  row.appendChild(content);
  wrap.appendChild(row);
  return wrap;
}

function getAll(){
  return CATS.filter(c=>c.id!=='all'&&c.id!=='random')
    .flatMap(c=>c.verbs.map(v=>({...v,catId:c.id,catColor:c.color,catLabel:c.label})));
}

function buildNav(){
  const nav=document.getElementById('cat-nav');
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c.id==='all'?' active':'');
    b.dataset.id=c.id; b.textContent=c.label;
    b.onclick=()=>switchTab(c.id);
    nav.appendChild(b);
  });
}

function switchTab(id){
  activecat=id;
  document.querySelectorAll('.cat-btn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';});
  const ab=document.querySelector(`.cat-btn[data-id="${id}"]`);
  ab.classList.add('active');
  const cat=CATS.find(c=>c.id===id);
  ab.style.background=cat.color; ab.style.color='#fff';
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  const sp=id!=='all'&&id!=='random';
  document.getElementById('prog-wrap').style.display=sp?'flex':'none';
  if(sp) updateProg(id);
}

function updateProg(catId){
  const cat=CATS.find(c=>c.id===catId);
  if(!cat||!cat.verbs.length) return;
  const total=cat.verbs.length, done=cat.verbs.filter((_,i)=>seen.has(catId+'-'+i)).length;
  const pct=Math.round(done/total*100);
  document.getElementById('prog-lbl').textContent=`${done} / ${total} đã xem`;
  document.getElementById('bar-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

  sec.appendChild(hdr);
  const grid=document.createElement('div'); grid.className='cards-grid';
  cat.verbs.forEach((v,i)=>grid.appendChild(buildCard(v,cat.id,i,cat.color,cat.light)));
  sec.appendChild(grid); return sec;
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
function init(){
  buildNav();
  const root=document.getElementById('sections-root');
  root.appendChild(buildAll());
  root.appendChild(buildRandom());
  CATS.filter(c=>c.id!=='all'&&c.id!=='random').forEach(c=>root.appendChild(buildCat(c)));
  const fb=document.querySelector('.cat-btn[data-id="all"]');
  if(fb){fb.style.background='#1B2A4A';fb.style.color='#fff';}
}
init();
</script>
